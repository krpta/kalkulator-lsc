<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Kalkulator Tuningu</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at top, #111 0%, #000 60%);
      color: #fff;
      padding: 30px 20px;
      max-width: 780px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 34px;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .item {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      background: linear-gradient(145deg, #1c1c1c, #151515);
      padding: 16px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    }

    .item span {
      font-size: 16px;
    }

    .item button {
      padding: 6px 14px;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      background: #2a2a2a;
      color: #fff;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .item button:hover {
      background: #3a3a3a;
      transform: scale(1.05);
    }

    .count {
      margin: 0 12px;
      min-width: 26px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .total {
      margin-top: 35px;
      font-size: 28px;
      text-align: center;
      background: linear-gradient(145deg, #222, #151515);
      padding: 18px;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>

<h1>Kalkulator LSC</h1>

<div id="items" class="grid"></div>

<div class="total" id="total">Łączny koszt: 0 $</div>

<script>
const categories = [
  {
    name: "NAPRAWKI",
    items: [
      { name: 'Pełna naprawka', price: 20000 },
      { name: 'Naprawka silnika', price: 15000 },
      { name: 'Mycie auta', price: 15000 },
      { name: 'Otwarcie zamka', price: 80000 },
    ]
  },
{
  name: "WIZUALKA",
  items: [
    { name: 'Naklejki', price: 40000 },
    { name: 'Dźwięk klaksonu', price: 30000 },
    { name: 'Zmiana koloru tablicy', price: 30000 },
    { name: 'Przyciemnianie szyb', price: 30000 },
    { name: 'Wymiana części karoserii', price: 40000 },
    { name: 'Extrasy', price: 60000 },
    { name: 'Pneumatyka', price: 100000 },
  ]
},
  {
    name: "ZMIANY KOLORÓW",
    items: [
      { name: 'Kolor główny', price: 25000 },
      { name: 'Kolor dodatkowy', price: 25000 },
      { name: 'Kolor wnętrza', price: 30000 },
      { name: 'Kolor deski rozdzielczej', price: 30000 },
    ]
  },
  {
    name: "WYMIANY KÓŁ",
    items: [
      { name: 'Wymiana felgi', price: 30000 },
      { name: 'Kolor felgi', price: 30000 },
      { name: 'Naklejki na opony', price: 30000 },
      { name: 'Dym spod opon', price: 30000 },
    ]
  },
  {
    name: "REFLEKTORY I NEONY",
    items: [
      { name: 'Xenony', price: 20000 },
      { name: 'Jedna strona neonu', price: 25000 },
      { name: 'Kolor neonu', price: 25000 },
    ]
  }
];

let counts = [];
let indexCounter = 0;

const itemsDiv = document.getElementById('items');

categories.forEach(category => {
  // nagłówek kategorii
  const header = document.createElement('h2');
  header.innerText = category.name;
  header.style.gridColumn = "1 / -1";
  header.style.marginTop = "20px";
  header.style.color = "#f7c948";
  itemsDiv.appendChild(header);

  category.items.forEach(item => {
    const index = indexCounter++;
    counts[index] = 0;

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <span>${item.name} (${item.price.toLocaleString('pl-PL')} $)</span>
      <div>
        <button onclick="change(${index}, -1)">-</button>
        <span class="count" id="count-${index}">0</span>
        <button onclick="change(${index}, 1)">+</button>
      </div>
    `;

    div.dataset.price = item.price;
    itemsDiv.appendChild(div);
  });
});

function change(index, delta) {
  counts[index] = Math.max(0, counts[index] + delta);
  document.getElementById(`count-${index}`).innerText = counts[index];
  calculate();
}

function calculate() {
  let sum = 0;
  let i = 0;

  document.querySelectorAll('.item').forEach(el => {
    const price = parseInt(el.dataset.price);
    sum += counts[i] * price;
    i++;
  });

  document.getElementById('total').innerText =
    'Łączny koszt: ' + sum.toLocaleString('pl-PL') + ' $';
}
</script>

</body>
</html>
